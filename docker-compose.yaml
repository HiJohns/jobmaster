version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobmaster
      POSTGRES_PASSWORD: jobmaster_dev_password
      POSTGRES_DB: jobmaster
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobmaster -d jobmaster"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobmaster-network

  # Redis (可选，用于缓存和会话)
  redis:
    image: redis:7-alpine
    container_name: jobmaster-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jobmaster-network

volumes:
  postgres_data:
    name: jobmaster_postgres_data
  redis_data:
    name: jobmaster_redis_data

networks:
  jobmaster-network:
    name: jobmaster-network
    driver: bridge
