version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobmaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobmaster
      POSTGRES_PASSWORD: jobmaster_dev_password
      POSTGRES_DB: jobmaster
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobmaster -d jobmaster"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobmaster-network

  redis:
    image: redis:7-alpine
    container_name: jobmaster-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jobmaster-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.go
    container_name: jobmaster-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: jobmaster
      DB_PASSWORD: jobmaster_dev_password
      DB_NAME: jobmaster
    command: ["--migrate"]
    networks:
      - jobmaster-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.go
    container_name: jobmaster-api
    restart: unless-stopped
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: jobmaster
      DB_PASSWORD: jobmaster_dev_password
      DB_NAME: jobmaster
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GIN_MODE: release
    networks:
      - jobmaster-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: jobmaster-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - jobmaster-network

volumes:
  postgres_data:
    name: jobmaster_postgres_data
  redis_data:
    name: jobmaster_redis_data

networks:
  jobmaster-network:
    name: jobmaster-network
    driver: bridge
